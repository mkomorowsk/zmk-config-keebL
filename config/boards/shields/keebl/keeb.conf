# Shared config for both halves
CONFIG_ZMK_SPLIT=y

CONFIG_ZMK_BLE=y

# Increase TX power for better BLE range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USB CDC logging (disable in production to save power)
CONFIG_ZMK_USB_LOGGING=y

# maciek - trying to get it working SOMEHOW
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y